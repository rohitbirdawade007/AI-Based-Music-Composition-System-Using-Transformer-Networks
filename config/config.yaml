# ============================================================
# AI-Based Music Composition System
# Central Configuration File
# ============================================================

project:
  name: "AI Music Composition System"
  version: "1.0.0"
  author: "Rohit Birdawade"
  github: "https://github.com/rohitbirdawade007/AI-Based-Music-Composition-System-Using-Transformer-Networks"

# ── Data Configuration ──────────────────────────────────────
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  sample_dir: "data/sample"
  output_dir: "output"
  max_sequence_length: 512
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# ── Tokenizer Configuration ─────────────────────────────────
tokenizer:
  vocab_size: 512
  max_pitch: 127
  min_pitch: 21
  special_tokens:
    PAD: 0
    BOS: 1
    EOS: 2
    REST: 3
    UNK: 4
  duration_bins: 32
  velocity_bins: 16
  tempo_bins: 8

# ── Model Architecture ──────────────────────────────────────
model:
  d_model: 256
  nhead: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  max_seq_len: 512
  vocab_size: 512
  positional_encoding: "sinusoidal"  # or "learnable"

# ── Training Configuration ──────────────────────────────────
training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.0001
  warmup_steps: 4000
  weight_decay: 0.01
  gradient_clip: 1.0
  label_smoothing: 0.1
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  save_every: 5
  eval_every: 1
  use_amp: true
  device: "cuda"  # or "cpu"

# ── Inference Configuration ─────────────────────────────────
inference:
  max_gen_length: 256
  default_temperature: 1.0
  default_top_k: 50
  default_top_p: 0.9
  default_beam_width: 4
  demo_mode: true  # Use heuristic generation when no checkpoint exists

# ── Music Theory Configuration ──────────────────────────────
music_theory:
  default_key: "C"
  default_mode: "major"
  available_keys:
    - "C" 
    - "C#" 
    - "D" 
    - "D#"
    - "E" 
    - "F" 
    - "F#" 
    - "G"
    - "G#" 
    - "A" 
    - "A#" 
    - "B"
  available_modes:
    - "major"
    - "minor"
    - "dorian"
    - "phrygian"
    - "lydian"
    - "mixolydian"
    - "locrian"
    - "pentatonic_major"
    - "pentatonic_minor"
    - "blues"
  chord_validation: true
  rhythm_validation: true
  melody_range_min: 40   # E2
  melody_range_max: 84   # C6

# ── RAG Configuration ───────────────────────────────────────
rag:
  index_dir: "faiss_index"
  embedding_dim: 128
  top_k_retrieval: 5
  similarity_threshold: 0.7
  max_stored_files: 100

# ── Streamlit App Configuration ──────────────────────────────
streamlit:
  page_title: "AI Music Composer"
  page_icon: "🎵"
  theme: "dark"
  default_genre: "Classical"
  default_mood: "Calm"
  default_tempo: 120
  default_instrument: "Piano"
  default_length: 64
  available_genres:
    - "Classical"
    - "Jazz"
    - "Pop"
    - "Blues"
    - "Electronic"
    - "Ambient"
    - "Folk"
  available_moods:
    - "Happy"
    - "Calm"
    - "Dramatic"
    - "Mysterious"
    - "Energetic"
    - "Melancholic"
    - "Romantic"
  available_instruments:
    - "Piano"
    - "Guitar"
    - "Strings"
    - "Flute"
    - "Violin"
    - "Organ"
    - "Synth"

# ── Flask API Configuration ──────────────────────────────────
api:
  host: "0.0.0.0"
  port: 5000
  debug: false
  cors_origins: "*"
  max_history: 50
  upload_folder: "data/uploads"

# ── Logging ──────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file: "logs/app.log"
